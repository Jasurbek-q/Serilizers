<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kutubxona{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                         'Segoe UI', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            font-size: 16px;
            line-height: 1.6;
        }

        /* --- NAV --- */
        nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
        }

        .nav-logo {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #1d1d1f;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-links a:hover { opacity: 1; }

        /* --- CONTAINER --- */
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* --- BUTTONS --- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.2s;
            letter-spacing: -0.1px;
        }

        .btn-primary {
            background: #0071e3;
            color: white;
        }
        .btn-primary:hover { background: #0077ed; }

        .btn-danger {
            background: transparent;
            color: #ff3b30;
            border: 1px solid #ff3b30;
        }
        .btn-danger:hover { background: #ff3b30; color: white; }

        .btn-secondary {
            background: transparent;
            color: #1d1d1f;
            border: 1px solid rgba(0,0,0,0.2);
        }
        .btn-secondary:hover { background: rgba(0,0,0,0.05); }

        .btn-success {
            background: #34c759;
            color: white;
        }
        .btn-success:hover { background: #30b652; }

        /* --- CARD --- */
        .card {
            background: white;
            border-radius: 18px;
            padding: 2rem;
            border: 1px solid rgba(0,0,0,0.06);
        }

        /* --- PAGE TITLE --- */
        .page-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1d1d1f;
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            font-size: 15px;
            color: #6e6e73;
            margin-bottom: 2rem;
        }

        /* --- TABLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.06);
        }

        thead tr {
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #6e6e73;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 20px;
            font-size: 15px;
            color: #1d1d1f;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f5f5f7; }

        /* --- FORM --- */
        .form-group { margin-bottom: 1.25rem; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid rgba(0,0,0,0.2);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            color: #1d1d1f;
            background: white;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }

        .form-input::placeholder { color: #aeaeb2; }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 1.5rem;
        }

        /* --- BADGE --- */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 980px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-blue { background: #e8f1fc; color: #0071e3; }
        .badge-green { background: #e8f8ec; color: #1a8731; }

        /* --- EMPTY STATE --- */
        .empty {
            text-align: center;
            padding: 4rem 2rem;
            color: #6e6e73;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 1rem;
        }

        .empty h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 0.5rem;
        }

        .empty p { font-size: 14px; margin-bottom: 1.5rem; }

        /* --- WARN BOX --- */
        .warn-box {
            background: #fff8f0;
            border: 1px solid #ffd0a8;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin: 1.5rem 0;
            font-size: 15px;
            color: #b25000;
        }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        /* --- DETAIL ROW --- */
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            font-size: 15px;
        }

        .detail-row:last-of-type { border-bottom: none; }
        .detail-label { color: #6e6e73; }
        .detail-value { font-weight: 500; color: #1d1d1f; }

        /* --- SELECT ROW --- */
        .select-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .select-row .form-select { flex: 1; }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'book_list' %}" class="nav-logo">📚 Kutubxona</a>
    <ul class="nav-links">
        <li><a href="{% url 'book_list' %}">Kitoblar</a></li>
        <li><a href="{% url 'auther_list' %}">Mualliflar</a></li>
        <li><a href="{% url 'book_create' %}">+ Kitob</a></li>
        <li><a href="{% url 'auther_create' %}">+ Muallif</a></li>
    </ul>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
